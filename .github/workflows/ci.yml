name: CI

on:
  push:
    branches: [main]
    paths:
      - "citecheck/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "citecheck/**"

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: citecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Mypy (best-effort, non-blocking)
        run: mypy src --ignore-missing-imports || true

  test:
    name: Pytest (fast tests only)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: citecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit tests (skip slow/gpu/network)
        run: pytest -m "not slow and not gpu and not network" --maxfail=5 -v
